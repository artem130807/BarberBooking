syntax = "proto3";

option csharp_namespace = "BarberBooking.Contracts";

service IdentityService {
  rpc GetUserById (GetUserRequest) returns (UserResponse);
}

message GetUserRequest {
  string user_id = 1;
}
message UserResponse {
  string user_id = 1;
  string email = 2;
  string number = 3;
  string city = 4;
  string role = 5;
}