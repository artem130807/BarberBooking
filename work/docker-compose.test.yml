services:
  identity_dev_postgres:
    image: postgres:16
    hostname: identity_dev_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5434:5433"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - test-net

  notify_dev_postgres:
    image: postgres:16
    hostname: notify_dev_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5435:5433"
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    networks:
      - test-net

  identity_dev_api:
    image: identity-api:dev
    hostname: identity_dev_api
    restart: always
    ports:
      - "8085:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=identity_dev_postgres;Port=5433;Database=identitydb;Username=admin;Password=secret
      - RUN_MIGRATIONS=true
    depends_on:
      - dev_postgres
      - rabbitmq
    networks:
      - test-net

  notify_dev_api:
    image: identity-api:dev
    hostname: notify_sdev_api
    restart: always
    ports:
      - "8086:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=notify_dev_postgres;Port=5433;Database=notifydb;Username=admin;Password=secret
      - RUN_MIGRATIONS=true
    depends_on:
      - dev_postgres
      - rabbitmq
    networks:
      - test-net


  rabbitmq:
    image: rabbitmq:3.10.7-management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=rmuser
      - RABBITMQ_DEFAULT_PASS=rmpassword
    ports:
      - "15673:15672"
    networks:
      - test-net

  networks:
    test-net:
      driver: bridge