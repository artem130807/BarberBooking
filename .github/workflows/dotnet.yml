name: CI/CD Pipeline

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ main ]    

jobs:
  test-and-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
      - name: Restore & Build & Test
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore
          dotnet test --no-build --verbosity normal
      - name: Build Docker image (для кэша)
        run: docker build -t barber-api:temp -f BarberBooking.API/Dockerfile .

  deploy-dev:
    needs: test-and-build
    if: github.ref_name == 'develop' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Deploy to Dev VM
        run: |
          ssh -p ${{ secrets.VM_PORT }} ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/project/BarberBooking
            git pull origin develop
            docker build -t barber-api:dev -f BarberBooking.API/Dockerfile .
            docker-compose down dev_api && docker-compose up -d dev_api
          EOF

  deploy-prod:
    needs: test-and-build
    if: github.ref_name == 'main' && github.event_name == 'push'
    runs-on: self-hosted
    steps:
      - name: Deploy to Prod VM
        run: |
          ssh -p ${{ secrets.VM_PORT }} ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} << 'EOF'
            cd ~/project/BarberBooking
            git pull origin main
            docker build -t barber-api:prod -f BarberBooking.API/Dockerfile .
            docker-compose down prod_api && docker-compose up -d prod_api
          EOF