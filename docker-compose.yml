version: "2.1"
services:
  dev_postgres:
    image: postgres:16
    hostname: dev_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barber-net
  prod_postgres:
    image: postgres:16
    hostname: prod_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - barber-net
  rabbitmq:
    image: rabbitmq:3.10.7-management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=rmuser
      - RABBITMQ_DEFAULT_PASS=rmpassword
    ports:
      - 15672:15672
  dev_api:
    image: barber-api:dev
    hostname: dev_api
    restart: always
    ports:
      - "8081:8080"   
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5433;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - dev_postgres
      - rabbitmq
    networks:
      - barber-net
  prod_api:
    image: barber-api:prod
    hostname: prod_api
    restart: always
    ports:
      - "8080:8080"   
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - prod_postgres
      - rabbitmq
    networks:
      - barber-net
networks:
  barber-net:
    driver: bridge

volumes:
  postgres_data: