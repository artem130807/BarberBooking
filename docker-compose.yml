services:
  dev_postgres:
    image: postgres:16
    hostname: dev_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5433:5432"
    volumes:
      - dev_postgres_data:/var/lib/postgresql/data
    networks:
      - barber-net

  prod_postgres:
    image: postgres:16
    hostname: prod_postgres
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: barberdb
    ports:
      - "5432:5432"
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    networks:
      - barber-net

  rabbitmq:
    image: rabbitmq:3.10.7-management
    hostname: rabbitmq
    restart: always
    environment:
      - RABBITMQ_DEFAULT_USER=rmuser
      - RABBITMQ_DEFAULT_PASS=rmpassword
    ports:
      - "15672:15672"
    networks:
      - barber-net

  dev_api:
    image: barber-api:dev
    hostname: dev_api
    restart: always
    ports:
      - "8081:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=dev_postgres;Port=5432;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - dev_postgres
      - rabbitmq
    networks:
      - barber-net

  prod_api1:
    image: barber-api:prod
    hostname: prod_api1
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=prod_postgres;Port=5432;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - prod_postgres
      - rabbitmq
    networks:
      - barber-net

  prod_api2:
    image: barber-api:prod
    hostname: prod_api2
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=prod_postgres;Port=5432;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - prod_postgres
      - rabbitmq
    networks:
      - barber-net

  prod_api3:
    image: barber-api:prod
    hostname: prod_api3
    restart: always
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DefaultConnection=Host=prod_postgres;Port=5432;Database=barberdb;Username=admin;Password=secret
    depends_on:
      - prod_postgres
      - rabbitmq
    networks:
      - barber-net

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - prod_api1
      - prod_api2
      - prod_api3
    networks:
      - barber-net

networks:
  barber-net:
    driver: bridge

volumes:
  dev_postgres_data:
  prod_postgres_data: