name: barber_booking_app
description: "Приложение для записи в барбершопы"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  http_parser: ^4.1.0
  provider: ^6.1.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  json_annotation: ^4.9.0
  image_picker: ^1.2.1
  excel: ^4.0.6
  path_provider: ^2.1.5
  share_plus: ^12.0.1
  signalr_netcore: ^1.4.4
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1

flutter:
  uses-material-design: true